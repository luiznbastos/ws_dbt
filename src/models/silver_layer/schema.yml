version: 2

models:
  - name: fct_events
    description: "Fact table containing every event from a match, enriched with possession and event type flags."
    columns:
      - name: match_id
        description: "Foreign key to dim_matches"
        tests:
          - not_null
          - relationships:
              to: ref('dim_matches')
              field: match_id
      - name: possession_chain
        description: "A unique identifier for a continuous period of possession by one team."
        tests:
          - not_null
      - name: event_id
        description: "Primary key for the event"
        tests:
          - not_null
      - name: team_id
        description: "Foreign key to dim_teams"
        tests:
          - not_null
          - relationships:
              to: ref('dim_teams')
              field: team_id
      - name: player_name
        description: "Name of the player, denormalized for easier analysis. Can be null for team-level events."

  - name: dim_matches
    description: "Dimension table containing match-level information."
    columns:
      - name: match_id
        description: "Primary key for the match."
        tests:
          - unique
          - not_null
      - name: home_team_id
        description: "ID of the home team."
        tests:
          - not_null
      - name: away_team_id
        description: "ID of the away team."
        tests:
          - not_null

  - name: dim_teams
    description: "Dimension table for teams."
    columns:
      - name: team_id
        description: "Primary key for the team."
        tests:
          - unique
          - not_null

  - name: dim_players
    description: "Dimension table for players."
    columns:
      - name: player_id
        description: "Primary key for the player."
        tests:
          - unique
          - not_null 